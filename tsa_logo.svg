<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="tsaShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a7a"/>
      <stop offset="50%" stop-color="#1e4494"/>
      <stop offset="100%" stop-color="#1a3a7a"/>
    </linearGradient>
  </defs>
  <!-- Main rectangle -->
  <rect x="10" y="10" width="280" height="180" rx="8" fill="#1e4494" stroke="#c41230" stroke-width="4"/>
  <!-- Top red bar -->
  <rect x="10" y="10" width="280" height="50" rx="8" fill="#c41230"/>
  <rect x="10" y="35" width="280" height="25" fill="#c41230"/>
  <!-- Bottom red bar -->
  <rect x="10" y="145" width="280" height="45" rx="8" fill="#c41230"/>
  <rect x="10" y="145" width="280" height="20" fill="#c41230"/>
  <!-- TSA text -->
  <text x="150" y="128" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle" letter-spacing="8">TSA</text>
  <!-- Top text -->
  <text x="150" y="42" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="white" text-anchor="middle" letter-spacing="2">TEXAS</text>
  <!-- Bottom text -->
  <text x="150" y="172" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="white" text-anchor="middle" letter-spacing="1.5">TECHNOLOGY STUDENT ASSOCIATION</text>
</svg>
